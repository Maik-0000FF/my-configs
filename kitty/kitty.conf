#
# Grundeinstellungen
font_family                 MesloLGS Nerd Font
font_size                   12
bold_font                   auto
italic_font                 auto
bold_italic_font            auto

# Fenstereinstellungen
remember_window_size        no
initial_window_width        950
initial_window_height       500
window_padding_width        4 0 0 4
hide_window_decorations     no
background_opacity          0.85
# dynamic_background_opacity  yes
confirm_os_window_close     0

# Cursor
cursor                      none
cursor_shape                block
shell_integration           no-cursor
cursor_blink_interval       0.5
cursor_stop_blinking_after  1
scrollback_lines            2000
wheel_scroll_min_lines      1

# Fenster-Rahmen (dezentes Graublau)
active_border_color         #565f89
inactive_border_color       #292e42
window_border_width         1pt

# Tab Bar
tab_bar_edge                bottom
tab_bar_style               powerline

# Audio
enable_audio_bell           no

# Wayland Input Method (für Fcitx5)
# DEAKTIVIERT: Kitty hat Probleme mit Input Context unter Wayland
# Stattdessen X11-Backend verwenden (siehe linux_display_server)
# wayland_enable_ime          yes

# Verwende X11 statt Wayland (bessere Fcitx5 Kompatibilität)
linux_display_server        x11

# Zwischenablage-Einstellungen für SSH-Unterstützung
clipboard_control write-clipboard write-primary read-clipboard-ask read-primary-ask
clipboard_max_size          64000000

# Fernsteuerung für sofortige Konfigurationsänderungen
allow_remote_control        yes
listen_on                   unix:/tmp/kitty

# Tastenkürzel für das Neuladen der Konfiguration
map ctrl+shift+f5           load_config_file

# Tastenkürzel für Split-Fenster
map ctrl+shift+h neighboring_window left
map ctrl+shift+j neighboring_window down
map ctrl+shift+k neighboring_window up
map ctrl+shift+l neighboring_window right

# Shift+Enter
map shift+enter send_text all \x1b\r

# Erstellen von neuen Splits
map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+\ launch --location=hsplit --cwd=current
map ctrl+shift+minus launch --location=vsplit --cwd=current

# Größe der Fenster anpassen
map ctrl+shift+left resize_window narrower
map ctrl+shift+right resize_window wider
map ctrl+shift+up resize_window taller
map ctrl+shift+down resize_window shorter


# Tokyo Night Farbschema
foreground                  #c0caf5
background                  #1a1b26
url_color                   #73daca

# Normal colors
color0                      #15161e
color1                      #f7768e
color2                      #9ece6a
color3                      #e0af68
color4                      #7aa2f7
color5                      #bb9af7
color6                      #7dcfff
color7                      #a9b1d6

# Bright colors
color8                      #414868
color9                      #f7768e
color10                     #9ece6a
color11                     #e0af68
color12                     #7aa2f7
color13                     #bb9af7
color14                     #7dcfff
color15                     #c0caf5

# Selection
selection_foreground        #c0caf5
selection_background        #33467c

# Animated cursor follows text
include $HOME/.config/ml4w/settings/kitty-cursor-trail.conf

# Obiges Farbschema überschreibt pywal-Farben, wenn es nach der pywal-Einbindung käme
# Falls du pywal trotzdem verwenden möchtest, setze es vor den eigenen Farben
# include $HOME/.cache/wal/colors-kitty.conf

# Include Custom Configuration
# Create the file custom.conf in ~/.config/kitty to overwrite the default configuration
include ./custom.conf
