# ─────────────────────────────────────────────────────────────
# tmux Konfiguration
# ─────────────────────────────────────────────────────────────

# ── TERMINAL / TRUE COLOR ─────────────────────────────────────
# Notwendig damit TokyoNight korrekt dargestellt wird
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"

# ── ALLGEMEIN ─────────────────────────────────────────────────
set -g mouse on
set -g history-limit 50000
set -sg escape-time 0          # Kein Delay bei ESC (wichtig für Neovim)
set -g focus-events on         # Fokus-Events an Apps weiterleiten (Neovim etc.)

set -g base-index 1            # Fenster ab 1 zählen
setw -g pane-base-index 1      # Panes ab 1 zählen
set -g renumber-windows on     # Lücken in Fensternummern schließen

# ── PREFIX ────────────────────────────────────────────────────
# Standard Ctrl+b beibehalten
# Zum Ändern auf Ctrl+a auskommentieren:
# set -g prefix C-a
# unbind C-b
# bind C-a send-prefix

# ── KEYBINDINGS ───────────────────────────────────────────────

# Config neu laden
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# Splits: | = neues Pane rechts, - = neues Pane unten
# Aktuelles Verzeichnis wird übernommen
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane-Navigation (vim-like)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane-Größe anpassen (wiederholbar: Taste gedrückt halten)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Zwischen letzten zwei Fenstern wechseln
bind Tab last-window

# Fenster verschieben
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1

# ── PLUGINS ───────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'janoamaral/tokyo-night-tmux'

# TokyoNight Variante: night | storm | day
set -g @tokyo-night-tmux_theme night
set -g @tokyo-night-tmux_transparent 0

# TPM initialisieren (muss am Ende stehen)
run '~/.tmux/plugins/tpm/tpm'
