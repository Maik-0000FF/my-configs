// Logitech MX Master 3S - Vollständige Konfiguration
// Datei muss nach /etc/logid.cfg kopiert werden:
//   sudo cp ~/logid.cfg /etc/logid.cfg

devices: ({
    name: "MX Master 3S For Mac";

    // === DPI ===
    // 200-8000 in 50er Schritten, Standard: 1000
    dpi: 1200;

    // === SmartShift (Scrollrad Freilauf/Raster) ===
    smartshift: {
        on: true;
        threshold: 15;    // Geschwindigkeit ab der Freilauf aktiviert wird (1-100, niedriger = empfindlicher)
        torque: 50;        // Widerstand des Scrollrads (1-100)
    };

    // === Hi-Res Scroll ===
    hiresscroll: {
        hires: true;       // Hochauflösendes Scrollen
        invert: false;     // Scrollrichtung umkehren (true = Natural Scrolling)
        target: false;     // false = freescroll Modus verfügbar
    };

    // === Thumbwheel (horizontales Scrollrad am Daumen) ===
    thumbwheel: {
        divert: true;
        invert: false;

        left: {
            threshold: 1;
            interval: 3;
            direction: "Left";
            mode: "OnInterval";
            action = {
                type: "Keypress";
                keys: ["KEY_VOLUMEDOWN"];
            };
        };

        right: {
            threshold: 1;
            interval: 3;
            direction: "Right";
            mode: "OnInterval";
            action = {
                type: "Keypress";
                keys: ["KEY_VOLUMEUP"];
            };
        };

    };

    // === Button-Konfiguration ===
    buttons: (

        // --- Zurück-Taste (seitlich oben) → Browser Zurück ---
        {
            cid: 0x0053;
            action: {
                type: "Keypress";
                keys: ["KEY_LEFTALT", "KEY_LEFT"];
            };
        },

        // --- Vorwärts-Taste (seitlich unten) → Browser Vorwärts ---
        {
            cid: 0x0056;
            action: {
                type: "Keypress";
                keys: ["KEY_LEFTALT", "KEY_RIGHT"];
            };
        },

        // --- Gesture-Button (Daumentaste) ---
        // Drücken = Mittlere Maustaste
        // Halten + Mausbewegung = Gesten
        {
            cid: 0x00c3;
            action: {
                type: "Gestures";
                gestures: (
                    // Einfacher Klick = Mittelklick (z.B. Link in neuem Tab öffnen)
                    {
                        direction: "None";
                        mode: "OnRelease";
                        action: {
                            type: "Keypress";
                            keys: ["BTN_MIDDLE"];
                        };
                    },

                    // Nach oben wischen = Maximieren
                    {
                        direction: "Up";
                        mode: "OnRelease";
                        action: {
                            type: "Keypress";
                            keys: ["KEY_LEFTMETA", "KEY_UP"];
                        };
                    },

                    // Nach unten wischen = Minimieren
                    {
                        direction: "Down";
                        mode: "OnRelease";
                        action: {
                            type: "Keypress";
                            keys: ["KEY_LEFTMETA", "KEY_DOWN"];
                        };
                    },

                    // Nach links wischen = Fenster links andocken
                    {
                        direction: "Left";
                        mode: "OnRelease";
                        action: {
                            type: "Keypress";
                            keys: ["KEY_LEFTMETA", "KEY_LEFT"];
                        };
                    },

                    // Nach rechts wischen = Fenster rechts andocken
                    {
                        direction: "Right";
                        mode: "OnRelease";
                        action: {
                            type: "Keypress";
                            keys: ["KEY_LEFTMETA", "KEY_RIGHT"];
                        };
                    }
                );
            };
        },

        // --- Scrollrad Modus-Umschaltung (hinter dem Scrollrad) ---
        {
            cid: 0x00c4;
            action: {
                type: "ToggleSmartShift";
            };
        }
    );
});
